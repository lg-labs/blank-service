<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AsyncAPI Documentation</title>
    <!--
      Renders the AsyncAPI spec with the same React component used by
      AsyncAPI Studio (https://studio.asyncapi.com/).

      The spec is loaded at runtime from `asyncapi.yaml` (sibling file).
      No build step is needed; we depend on the official CDN-hosted
      web-component, kept up-to-date by the AsyncAPI team.

      Pinned to majors to balance "always up-to-date" with reproducibility.
    -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/@asyncapi/react-component@2/styles/default.min.css"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
          Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      }
      .loading {
        padding: 2rem;
        color: #6b7280;
      }
      .error {
        padding: 2rem;
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <div id="asyncapi-container">
      <p class="loading">Loading AsyncAPI specification…</p>
    </div>

    <script src="https://unpkg.com/@asyncapi/web-component@3/lib/asyncapi-web-component.js" defer></script>
    <script>
      (async () => {
        const container = document.getElementById("asyncapi-container");
        try {
          const res = await fetch("./asyncapi.yaml", { cache: "no-cache" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const schema = await res.text();

          const component = document.createElement("asyncapi-component");
          component.setAttribute("cssImportPath", "https://unpkg.com/@asyncapi/react-component@2/styles/default.min.css");
          component.schema = schema;

          container.innerHTML = "";
          container.appendChild(component);
        } catch (err) {
          container.innerHTML =
            '<p class="error">Failed to load asyncapi.yaml: ' +
            err.message +
            "</p>";
        }
      })();
    </script>
  </body>
</html>
