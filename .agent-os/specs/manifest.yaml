# Specs manifest — lg5-spring-agent-os bundle
# Spec-driven workflow templates and example specs.
#
# Format conventions:
#   - Templates live under templates/ and are named <name>-template.md.
#   - Example specs live under examples/<feature-name>/ as a folder per feature.
#   - Every template + example file has YAML frontmatter (kind, version,
#     description) so CI can validate consistency.

bundle:
  name: lg5-spring-agent-os
  version: 0.3.2
  lg5-spring-sha: d0d754a

specs:
  # Templates
  - name: prd-template
    file: templates/prd-template.md
    kind: template
    version: 0.2.0
    description: Functional PRD for an lg5-spring microservice or feature. Used by /sdd-specify.
  - name: adr-template
    file: templates/adr-template.md
    kind: template
    version: 0.2.0
    description: Lightweight ADR template aware of the lg5-spring constitution.
  - name: plan-template
    file: templates/plan-template.md
    kind: template
    version: 0.1.0
    description: Technical plan derived from a PRD + ADRs. Used by /sdd-plan.
  - name: tasks-template
    file: templates/tasks-template.md
    kind: template
    version: 0.1.0
    description: Atomic TASK-NNN list. Used by /sdd-tasks; consumed by /sdd-implement.
  - name: data-model-template
    file: templates/data-model-template.md
    kind: template
    version: 0.1.0
    description: Concrete data shapes (aggregates, events, outbox, REST DTOs, Avro, JPA).
  - name: research-template
    file: templates/research-template.md
    kind: template
    version: 0.1.0
    description: Optional time-boxed spike doc. Outcome usually feeds an ADR.
  # Examples (folder per feature)
  - name: loyalty-ledger
    file: examples/loyalty-ledger/
    kind: example
    version: 0.1.0
    description: End-to-end SDD spec example (PRD + ADRs + plan + data-model + tasks) for a hypothetical loyalty-ledger service.
