# Rules manifest — lg5-spring-agent-os bundle
# Always-active rules extracted from AGENTS.md. Every rule:
#   - has its own <id>-<slug>.md file in this directory
#   - has YAML frontmatter (id, version, lg5-spring-sha, severity, scope, tags, description)
#   - is auto-loaded by the agent (always-active, not on-demand)
#
# CI validates that:
#   - every rule file declares the same `lg5-spring-sha` as the bundle
#   - every rule's `id` matches its filename
#   - every rule listed here exists on disk and vice versa
#   - severity ∈ {must, should, info}
#   - scope ∈ {framework, architecture, kafka, outbox, saga, testing, style, build, reference}

