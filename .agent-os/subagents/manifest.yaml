# Subagents manifest — lg5-spring-agent-os bundle
# Specialized subagents the orchestrator agent can spawn for delegated work.
# Format: each subagent is a single .md file at the root of subagents/ with
# YAML frontmatter (description, tools, model) and a body that is the
# system prompt of the subagent.
#
# CI validates that every entry below maps 1:1 to a file on disk and that
# every file declares the required frontmatter keys.

bundle:
  name: lg5-spring-agent-os
  version: 0.3.6
  lg5-spring-sha: d0d754a

subagents:
  - name: lg5-code-reviewer
    file: lg5-code-reviewer.md
    version: 0.1.0
    description: Reviews diffs against the 18 hard rules; cites violations by RULE-ID.
  - name: lg5-test-generator
    file: lg5-test-generator.md
    version: 0.1.0
    description: Generates IT/ATDD test scaffolds following RULE-012/013 patterns.
  - name: lg5-planner
    file: lg5-planner.md
    version: 0.1.0
    description: Decomposes a feature request into rule-aligned implementation steps.
  - name: lg5-ci-cd-engineer
    file: lg5-ci-cd-engineer.md
    version: 0.1.0
    description: Specialist for GitHub Actions CI/CD on lg5-spring (workflow, composite Maven-creds action, API doc sites, Allure, supply-chain hardening).
